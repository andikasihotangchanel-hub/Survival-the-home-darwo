<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>99 Malam Rumah Darmo</title>

<style>
body{margin:0;overflow:hidden;background:black}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:20px;
font-family:sans-serif;
}

#joystick{
position:absolute;
bottom:60px;
left:40px;
width:120px;
height:120px;
background:rgba(255,255,255,0.1);
border-radius:50%;
}

#stick{
position:absolute;
width:50px;
height:50px;
background:white;
border-radius:50%;
top:35px;
left:35px;
}

</style>
</head>

<body>

<div id="ui">Malam: <span id="night">1</span>/99</div>

<div id="joystick">
<div id="stick"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer=new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let light=new THREE.PointLight(0xffffff,1)
light.position.set(0,10,0)
scene.add(light)

let floorMat=new THREE.MeshPhongMaterial({color:0x303030})
let wallMat=new THREE.MeshPhongMaterial({color:0x202020})

function floor(y){

let mesh=new THREE.Mesh(
new THREE.BoxGeometry(30,1,30),
floorMat
)

mesh.position.y=y
scene.add(mesh)

}

floor(0)
floor(8)
floor(16)

function room(x,y,z){

let mesh=new THREE.Mesh(
new THREE.BoxGeometry(8,4,8),
new THREE.MeshPhongMaterial({color:0x151515})
)

mesh.position.set(x,y,z)
scene.add(mesh)

}

room(-8,18,0)
room(8,18,0)

room(-8,10,0)
room(8,10,0)

room(-8,2,0)
room(8,2,0)

let stairs=new THREE.Mesh(
new THREE.BoxGeometry(4,8,4),
new THREE.MeshPhongMaterial({color:0x555555})
)

stairs.position.set(0,12,0)
scene.add(stairs)

let ritual=new THREE.Mesh(
new THREE.CircleGeometry(3,32),
new THREE.MeshBasicMaterial({color:0xff0000})
)

ritual.rotation.x=-Math.PI/2
ritual.position.set(0,8.6,-6)

scene.add(ritual)

function bathroom(x){

let b=new THREE.Mesh(
new THREE.BoxGeometry(3,3,3),
new THREE.MeshPhongMaterial({color:0x888888})
)

b.position.set(x,9,6)
scene.add(b)

}

bathroom(-6)
bathroom(6)

function hideSpot(x,y,z){

let h=new THREE.Mesh(
new THREE.BoxGeometry(2,2,2),
new THREE.MeshPhongMaterial({color:0x663300})
)

h.position.set(x,y,z)
scene.add(h)

}

hideSpot(-6,2,-6)
hideSpot(6,2,-6)

let ghost=new THREE.Mesh(
new THREE.SphereGeometry(1,16,16),
new THREE.MeshBasicMaterial({color:0xffffff})
)

ghost.position.set(0,10,-10)
scene.add(ghost)

camera.position.set(0,18,5)

let moveX=0
let moveZ=0

document.addEventListener("keydown",e=>{

if(e.key=="w")moveZ=-0.15
if(e.key=="s")moveZ=0.15
if(e.key=="a")moveX=-0.15
if(e.key=="d")moveX=0.15

})

document.addEventListener("keyup",e=>{

moveX=0
moveZ=0

})

document.addEventListener("mousemove",e=>{

camera.rotation.y=-(
e.clientX/window.innerWidth-0.5
)*3

camera.rotation.x=-(
e.clientY/window.innerHeight-0.5
)

})

let night=1

setInterval(()=>{

if(night<99){

night++

document.getElementById("night").innerText=night

ghostSound()

}

},25000)

function ghostSound(){

let a=new Audio(
"https://cdn.pixabay.com/audio/2022/03/24/audio_5b6c86388a.mp3"
)

a.volume=0.5
a.play()

}

function ghostAI(){

ghost.position.x+=(
camera.position.x-ghost.position.x
)*0.002

ghost.position.z+=(
camera.position.z-ghost.position.z
)*0.002

}

function animate(){

camera.translateX(moveX)
camera.translateZ(moveZ)

ghostAI()

renderer.render(scene,camera)

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
